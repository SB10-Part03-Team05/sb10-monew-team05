# ---------------------------------------------------------------- #
# AI 기본 설정 (언어 및 페르소나)
# ---------------------------------------------------------------- #

language: ko-KR # AI가 응답할 때 사용할 기본 언어를 설정합니다. (예: ko-KR, en-US)
early_access: false  # CodeRabbit의 실험/베타 기능 사용 안함
enable_free_tier: true  # 무료 티어 기능 허용

# AI의 페르소나와 응답 톤앤매너를 상세하게 지시합니다. 최대 200자까지 작성할 수 있습니다.
tone_instructions: >
  당신은 '코드잇'의 10년차 테크 리드 개발자입니다. 목표는 코드잇 스프린터들이 코드 품질을 개선하며 성장하도록 돕는 것입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  2. 리뷰는 교육적이어야 하며, 관련 개념이나 공식 문서를 함께 추천하세요.
  3. 비판보다는 개선 중심의 제안을 우선하세요.
  4. 칭찬은 짧고 위트 있게 작성하세요.

# ---------------------------------------------------------------- #
# 코드 리뷰 기능 세부 설정
# ---------------------------------------------------------------- #
reviews:
  profile: chill  # 리뷰 스타일: chill(부드러움), strict(엄격) 등 중 chill 선택
  request_changes_workflow: false # 수정 요청 워크플로우 비활성화 (활성화 시 적극적인 수정 요구)
  high_level_summary: true  # PR 전체에 대한 고수준 요약 생성
  review_status: true  # 리뷰 상태를 PR에 표시
  commit_status: true  # 커밋 상태 체크 표시
  poem: false  # 리뷰에 재치있는 시/poem 추가 안함
  changed_files_summary: true  # 변경된 파일 요약 제공
  collapse_walkthrough: true  # 상세 walkthrough 접어서 표시 (UI 깔끔)
  sequence_diagrams: false  # 시퀀스 다이어그램 생성 안함


  # ---------------------------------------------------------------- #
  # 자동 리뷰 트리거 설정
  # ---------------------------------------------------------------- #
  auto_review: # 자동 리뷰 설정
    enabled: true  # PR 열리면 자동 리뷰 시작
    auto_incremental_review: true  # 새로운 커밋마다 변경분만 추가 리뷰 (전체 재검토 아님)
    base_branches: # 자동 리뷰 대상 기본 브랜치
      - 'main'
      - 'dev'
  # ---------------------------------------------------------------- #
  # 외부 도구 연동 (보안 + 기본 품질 검사)
  # ---------------------------------------------------------------- #
  tools:
    # 🔒 보안 검사 (비밀키 유출 탐지 필수)
    gitleaks: # Git 커밋에서 API키, 비밀번호, 토큰 등 유출 탐지
      enabled: true
    semgrep: # 보안 취약점, 알려진 악성 패턴 탐지
      enabled: true



# ---------------------------------------------------------------- #
# 채팅 기능 설정
# ---------------------------------------------------------------- #
chat:
  # 사용자가 @coderabbitai 태그를 지정하지 않아도 자동으로 답글을 달 수 있도록 설정합니다.
  auto_reply: true

# ---------------------------------------------------------------- #
# CodeRabbit의 지식 기반(Knowledge Base) 설정
# ---------------------------------------------------------------- #
knowledge_base:
  web_search: # 웹 검색을 통해 최신 정보나 문서를 참조할 수 있도록 허용할지 여부입니다.
    enabled: true
  opt_out: false  # 학습 기능 사용
  learnings: # 학습 데이터 수집 범위
    scope: auto
  issues: # 이슈 학습 범위
    scope: auto
  pull_requests: # PR 학습 범위
    scope: auto

