services:
  app:
    image: monew:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monew-server
    ports:
      - "8080:80"
    environment:
      - SERVER_PORT=80
      - SPRING_PROFILES_ACTIVE=dev
      # DB 설정 (아래 db 서비스와 연결, 나중에 RDS로 전환 예정)
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # MongoDB 설정
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_PROTO=${MONGO_PROTO:-mongodb}
      - MONGO_HOST=${MONGO_HOST:-mongodb}
      - MONGO_DB=${MONGO_DB}
      # AWS 설정
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_PRESIGNED_URL_EXPIRATION=${AWS_S3_PRESIGNED_URL_EXPIRATION}

    depends_on:
      - db # RDS 전환 시 주석 처리 또는 삭제하세요.
      - mongodb
    networks:
      - monew-network

  # ---------------------------------------------------------
  # [PostgreSQL 로컬 컨테이너]
  # RDS 세팅 완료 후에는 이 'db' 서비스 블록 전체를 주석 처리하거나 삭제하세요.
  # ---------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: monew-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - monew-postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema-postgre.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    networks:
      - monew-network

  # ---------------------------------------------------------
  # [MongoDB 로컬 컨테이너]
  # ---------------------------------------------------------
  mongodb:
    image: mongo:latest
    container_name: monew-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}     # 초기 루트 계정
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD} # 초기 루트 비밀번호
      - MONGO_INITDB_DATABASE=${MONGO_DB}             # 초기 생성 데이터베이스
    ports:
      - "27017:27017"
    volumes:
      - monew-mongodb-data:/data/db
      - monew-mongodb-config:/data/configdb
    networks:
      - monew-network

volumes:
  monew-postgres-data: # RDS로 전환 시 볼륨도 필요없으므로 주석 처리 또는 삭제하세요.
  monew-mongodb-data:
  monew-mongodb-config:

networks:
  monew-network:
    driver: bridge